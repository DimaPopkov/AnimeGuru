{% extends 'main/base.html' %}

{% block title %}
    {{ title }}
{% endblock %}

{% load static %}
{% block content %}
    <div class="container_d">
        <div class="container_f">
            <div class="new_posts main_items_background">
                <div class="new_products_title">
                    <h2 class="new_products_h4" style="margin: 0 auto;"> Добавление публикации </h2>
                </div>
                <form id="form" method="POST" action="{% url 'confirm' %}" enctype="multipart/form-data">
                    {% csrf_token %}
                    <input type="hidden" name="cropped_data" id="cropped_data">
                    <div class="posts_create">
                        <h3 for="media"> Обложка </h3>

                        <img class="hidden" src="{{ post.media }}" id="avatar" style="width:320px; height: 180px; margin-bottom: 20px; border: 1px solid rgb(100, 100, 100);">

                        <div id="avatar_none" style="width:320px; height: 180px; margin-bottom: 20px; border: 1px solid rgb(100, 100, 100); align-content: center; text-align: center;"> 
                            <h4> Не выбрана </h4> 
                        </div>

                        <button type="button" id="changeAvatarBtn" class="profile_container_header_block_info_flex_vis_button">Изменить обложку</button> 
                        <div class="avatar-modal-overlay" id="avatarModalOverlay">
                            <div class="avatar-modal">
                                <h2>Редактирование аватара</h2>
                                <div class="image-container">
                                    <!-- Здесь будет отображаться изображение для редактирования -->
                                    <img id="editableAvatar" alt="Изображение для редактирования">
                                </div>
                                <div class="modal-controls">
                                    <input type="file" name="avatar" id="avatarFileInput" accept="image/*">
                                    <div style="display: flex; justify-content: center;">                                   
                                        <button type="button" id="cancelAvatarBtn">Отмена</button>
                                        <button type="button" id="saveAvatarBtn">Сохранить</button>
                                    </div>
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="posts_create">
                        <h3 for="title"> Заголовок </h3>
                        <input id="title" name="title" class="main_items_background find_by_name2 posts_create_input" type="text" placeholder='Например: Обьяснение вселенной "Блич"'>
                    </div>
                    <div class="posts_create">
                        <h3 for="text"> Текст поста </h3>
                        <textarea id="text" name="text" class="main_items_background find_by_name2 posts_create_input" type="text" placeholder='Например: Данный пост посвящен вселенной "Блич" и её главным героям - Ичиго Куросаки...'></textarea>
                    </div>

                    <div class="posts_create_alt">
                        <a class="btn btn-danger btn-auto" href="../"> Отмена </a>
                        <button type="submit" class="btn btn-success btn-auto">Опубликовать</button>
                    </div>
                    {% if error %}
                        <div class="alert alert-danger" style="margin: 20px 20px;">
                            {{ error }}
                        </div>
                    {% endif %}
                </form>
            </div>
        </div>
    </div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.12/cropper.min.js"></script>
    <script>
        let cropper = null;
        const form = document.getElementById('form');
        const avatarElement = document.getElementById('avatar');
        const avatarNone = document.getElementById('avatar_none');
        const changeAvatarBtn = document.getElementById('changeAvatarBtn');
        const avatarModalOverlay = document.getElementById('avatarModalOverlay');
        const avatarFileInput = document.getElementById('avatarFileInput');
        const editableAvatar = document.getElementById('editableAvatar');
        const saveAvatarBtn = document.getElementById('saveAvatarBtn');
        const cancelAvatarBtn = document.getElementById('cancelAvatarBtn');
        const avatar_none = document.getElementById('avatar_none');
        const hiddenInput = document.getElementById('cropped_data');

        form.addEventListener('submit', (e) => {
            if (!hiddenInput.value) {
                hiddenInput.value = 'none';
            }
        });

        // --- Функция открытия модального окна ---
        function openAvatarModal() {
            avatarModalOverlay.style.display = 'flex'; // Показываем модальное окно
        }

        // --- Функция закрытия модального окна ---
        function closeAvatarModal() {
            avatarModalOverlay.style.display = 'none'; // Скрываем модальное окно
            avatarFileInput.style.display = 'inline-block';
            // Очищаем экземпляр Cropper.js, если он был создан
            if (cropper) {
                cropper.destroy();
                cropper = null;
            }
            // Сбрасываем поле выбора файла
            avatarFileInput.value = '';
            // Сбрасываем src изображения для редактирования
            editableAvatar.src = '';
        }

        // --- Функция для инициализации Cropper.js ---
        function initializeCropper(imageSrc) {
            editableAvatar.src = imageSrc; // Устанавливаем изображение для редактирования

            // Ждем, пока изображение загрузится, чтобы Cropper.js смог его инициализировать
            editableAvatar.onload = () => {
                avatarFileInput.style.display = 'none';
                cropper = new Cropper(editableAvatar, {
                    aspectRatio: 16 / 9, // Можно настроить соотношение сторон (например, 16/9, null для свободной обрезки)
                    viewMode: 1, // Режим просмотра: 0 (по умолчанию), 1 (ограничивает кроппер областью контейнера), 2 (ограничивает кроппер изображением), 3 (ограничивает кроппер контейнером и изображением)
                    autoCropArea: 0.8, // Область автоматической обрезки (от 0 до 1)
                    responsive: true, // Адаптивность
                });
            };
        }

        // --- Функция для сохранения отредактированного аватара ---
        function saveAvatar() {
            if (cropper) {

                // Получаем изображение в формате Canvas
                const canvas = cropper.getCroppedCanvas();
                // Преобразуем Canvas в Data URL (base64 строку)
                const croppedImageUrl = canvas.toDataURL('image/jpeg');

                const csrftoken = getCookie('csrftoken');
                // Устанавливаем отредактированное изображение как src для основного аватара
                avatarElement.src = croppedImageUrl;
                if(avatarElement.classList.item('hidden')){    
                    avatarElement.classList.remove('hidden');
                }
                avatarNone.classList.add('hidden');

                const formData = new URLSearchParams();
                formData.append('image', croppedImageUrl);
                formData.append('user_id', '{{ request.user.username }}');

                if (hiddenInput) {
                    hiddenInput.value = croppedImageUrl;
                }

                // fetch('/user/change-avatar', {
                //     method: 'POST',
                //     headers: {
                //         'Content-Type': 'application/x-www-form-urlencoded',
                //         'X-CSRFToken': csrftoken,
                //     },
                //     body: formData
                // })
                // .then(response => response.json())
                // .then(data => {
                //    console.log('Аватар сохранен на сервере:', data);
                // })
                // .catch(error => console.error('Ошибка сохранения аватара:', error));

                closeAvatarModal();
            } else {
                alert('Изображение не было отредактировано.');
            }
        }

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let i = 0; i < cookies.length; i++) {
                    const cookie = cookies[i].trim();
                    if (cookie.substring(0, name.length + 1) === (name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }

        // --- Основная функция add_avatar ---
        function add_avatar() {
            openAvatarModal(); // Открываем модальное окно
        }

        // --- Обработчики событий ---

        // Кнопка "Изменить аватар"
        changeAvatarBtn.addEventListener('click', add_avatar);

        // Обработка выбора файла
        avatarFileInput.addEventListener('change', function(event) {
            const file = event.target.files[0]; // Получаем выбранный файл

            if (file) {
                const reader = new FileReader(); // Объект для чтения файлов

                reader.onload = function(e) {
                    // Когда файл будет прочитан, инициализируем Cropper.js
                    initializeCropper(e.target.result);
                };

                reader.readAsDataURL(file); // Читаем файл как Data URL
            }
        });

        // Кнопка "Сохранить"
        saveAvatarBtn.addEventListener('click', saveAvatar);

        // Кнопка "Отмена"
        cancelAvatarBtn.addEventListener('click', closeAvatarModal);
    </script>
{% endblock %}
