<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Страница не найдена — 404</title>
    <style>
        body {
            background-color: #26262b; /* Используйте ваш темный фон */
            color: #fff;
            font-family: Arial, sans-serif;
            text-align: center;
            padding: 100px 20px;
        }
        h1 {
            font-size: 120px;
            margin: 0;
            color: #a176ff; /* Ваш фиолетовый акцент */
        }
        p {
            font-size: 20px;
            color: rgb(200, 200, 200);
        }
        .btn {
            display: inline-block;
            margin-top: 30px;
            padding: 12px 24px;
            background-color: #6225ff;
            color: white;
            text-decoration: none;
            border-radius: 6px;
            transition: background 0.3s;
        }
        .btn:hover {
            background-color: #a176ff;
        }
    </style>
</head>
<body>
    <h1>404</h1>
    <p>Упс! Страница, которую вы ищете, не существует или была перемещена.</p>
    <a href="/" class="btn">Вернуться на главную</a>
</body>
</html>
